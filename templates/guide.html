<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI导购 - 雨虹智慧门店</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1677FF; }
        body { background: #f0f2f5; font-family: -apple-system, "PingFang SC", sans-serif; }
        .navbar { background: linear-gradient(135deg, var(--primary) 0%, #0958d9 100%); }
        .navbar-brand { color: #fff !important; font-weight: 700; }
        .card { border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .chat-box { height: 400px; overflow-y: auto; padding: 16px; background: #f8f9fa; border-radius: 8px; }
        .msg-user { background: var(--primary); color: #fff; padding: 10px 14px; border-radius: 12px 12px 4px 12px; max-width: 75%; margin-left: auto; margin-bottom: 10px; }
        .msg-ai { background: #fff; color: #333; padding: 10px 14px; border-radius: 12px 12px 12px 4px; max-width: 75%; margin-bottom: 10px; border: 1px solid #e8e8e8; }
        .product-card { border: 1px solid #e8e8e8; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .product-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(22,119,255,0.1); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/"><span style="color:#E8392B;">雨虹</span> AI导购助手</a>
            {% if mock_mode %}<span class="badge bg-warning text-dark">Demo</span>{% endif %}
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-3">
            <!-- AI对话 -->
            <div class="col-lg-7">
                <div class="card p-4">
                    <h5 class="mb-3">🤖 雨虹AI导购助手</h5>
                    <div class="chat-box" id="chatBox">
                        <div class="msg-ai">您好！我是雨虹AI导购助手。我可以帮您：<br>1. 推荐合适的防水材料<br>2. 提供施工方案建议<br>3. 计算材料用量<br>4. 解答产品相关问题<br><br>请描述您的需求，例如："卫生间漏水怎么处理？"</div>
                    </div>
                    <div class="input-group mt-3">
                        <input type="text" class="form-control" id="chatInput" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter') sendMsg()">
                        <button class="btn btn-primary" onclick="sendMsg()">发送</button>
                    </div>
                    <div class="mt-2 d-flex gap-2 flex-wrap">
                        <button class="btn btn-sm btn-outline-primary" onclick="quickAsk('卫生间漏水怎么处理？')">卫生间漏水</button>
                        <button class="btn btn-sm btn-outline-primary" onclick="quickAsk('外墙渗水怎么办？')">外墙渗水</button>
                        <button class="btn btn-sm btn-outline-primary" onclick="quickAsk('屋顶防水方案')">屋顶防水</button>
                        <button class="btn btn-sm btn-outline-primary" onclick="quickAsk('施工流程是什么？')">施工流程</button>
                    </div>
                </div>
            </div>

            <!-- 产品列表与推荐 -->
            <div class="col-lg-5">
                <div class="card p-4 mb-3">
                    <h5 class="mb-3">🔍 产品搜索</h5>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索产品...">
                        <button class="btn btn-primary" onclick="searchProducts()">搜索</button>
                    </div>
                    <div id="productList"></div>
                </div>

                <div class="card p-4">
                    <h5 class="mb-3">💡 智能推荐</h5>
                    <div class="mb-2">
                        <select class="form-select form-select-sm" id="sceneSelect">
                            <option value="卫生间">卫生间防水</option>
                            <option value="外墙">外墙防水</option>
                            <option value="屋顶">屋面防水</option>
                            <option value="厨房">厨房防水</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <input type="number" class="form-control form-control-sm" id="areaInput" placeholder="施工面积(㎡)">
                    </div>
                    <button class="btn btn-primary btn-sm w-100" onclick="getRecommendation()">获取推荐</button>
                    <div id="recommendResult" class="mt-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 加载产品列表
        async function loadProducts() {
            const resp = await fetch('/api/guide/products');
            const result = await resp.json();
            displayProducts(result.data);
        }

        function displayProducts(products) {
            let html = '';
            products.forEach(p => {
                html += `<div class="product-card" onclick="showDetail('${p.id}')">
                    <div class="d-flex justify-content-between">
                        <strong>${p.name}</strong>
                        <span class="text-primary">¥${p.price}/${p.unit}</span>
                    </div>
                    <small class="text-muted">${p.description}</small>
                </div>`;
            });
            document.getElementById('productList').innerHTML = html || '<p class="text-muted">暂无产品</p>';
        }

        async function searchProducts() {
            const keyword = document.getElementById('searchInput').value;
            const resp = await fetch(`/api/guide/products?keyword=${keyword}`);
            const result = await resp.json();
            displayProducts(result.data);
        }

        async function sendMsg() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            document.getElementById('chatBox').innerHTML += `<div class="msg-user">${msg}</div>`;
            input.value = '';
            const chatBox = document.getElementById('chatBox');
            chatBox.scrollTop = chatBox.scrollHeight;

            const resp = await fetch('/api/guide/consult', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({question: msg})});
            const result = await resp.json();
            document.getElementById('chatBox').innerHTML += `<div class="msg-ai" style="white-space:pre-wrap">${result.data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function quickAsk(question) {
            document.getElementById('chatInput').value = question;
            sendMsg();
        }

        async function getRecommendation() {
            const scene = document.getElementById('sceneSelect').value;
            const area = parseFloat(document.getElementById('areaInput').value) || null;
            const resp = await fetch('/api/guide/recommend', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({scene, area})});
            const result = await resp.json();
            let html = '';
            result.data.forEach((p, i) => {
                html += `<div class="product-card">
                    <div class="d-flex justify-content-between">
                        <strong>${i+1}. ${p.name}</strong>
                        <span class="badge bg-primary">推荐分:${p.recommend_score}</span>
                    </div>
                    <small class="text-muted">${p.description}</small>
                    ${p.estimated_amount ? `<small class="text-primary">预计用量: ${p.estimated_amount}${p.unit} | 预计费用: ¥${p.estimated_cost}</small>` : ''}
                </div>`;
            });
            document.getElementById('recommendResult').innerHTML = html || '<p class="text-muted">暂无推荐</p>';
        }

        function showDetail(id) { alert('产品详情功能开发中，ID: ' + id); }

        loadProducts();
    </script>
</body>
</html>
